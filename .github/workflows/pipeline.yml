name: Build C++ Project

on: push

jobs:
  print-job:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: grpc_server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # <-- Fixed: changed 'run' to 'uses'
      - name: Install Protobuf and gRPC dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            protobuf-compiler-grpc
      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build project
        run: cmake --build build