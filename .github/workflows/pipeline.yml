name: Build Python Package

on: push

jobs:
  build-pypi:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: grpc_client  # <-- Points all run steps to your subfolder

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
     
      - name: Install build and gRPC tools
        run: pip install build grpcio-tools

      # Generate _pb2.py and _pb2_grpc.py files from your .proto file
      - name: Generate Protobuf Python files
        run: |
          python -m grpc_tools.protoc \
            -I.. \
            --python_out=. \
            --grpc_python_out=generated \
            ../proto_definitions/robot_control_api.proto

      - name: Build wheel and source distribution
        run: python -m build

      # ADD THIS STEP AT THE END:
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: grpc_client/dist/