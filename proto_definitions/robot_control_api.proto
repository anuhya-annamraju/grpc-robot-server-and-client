syntax = "proto3";

service RobotControlServices {

    // Request-Response type service
    rpc GetRobotId(RobotIdRequest) returns (RobotIdResponse);

    // Uni-directional server streaming service
    rpc GetBatteryLevel(BatteryLevelRequest) returns (stream BatteryLevelResponse);

    // Bi-directional streaming service
    rpc MoveRobotCommand(stream MoveCommand) returns (stream TelemetryResponse);
    }

message RobotIdRequest{}
message RobotIdResponse 
{
    string id = 1;
}

message BatteryLevelRequest{}
message BatteryLevelResponse{
    uint32 percentage = 1;
}

message MoveCommand {
enum Direction {
        FORWARD = 0; // First enum value must always be 0 in proto3
        LEFT = 1;
        RIGHT = 2;
        BACK = 3;
    }
    Direction direction = 1;
}
message TelemetryResponse {
    float pos_x = 1;
    float pos_y = 2;
    float pos_z = 3;
    float ang_vel_x = 4;
    float ang_vel_y = 5;
    float ang_vel_z = 6;
}

message CloseConnectionRequest {}
